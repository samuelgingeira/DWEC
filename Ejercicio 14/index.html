<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de Productos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="banner"></div>

  <h1>Catálogo de Productos</h1>

  <div class="theme-buttons">
    <button id="tema-claro">Tema Claro</button>
    <button id="tema-oscuro">Tema Oscuro</button>
  </div>

  <select id="categoriaSelect"></select>
  <button id="sortAsc">Precio ↑</button>
  <button id="sortDesc">Precio ↓</button>

  <p id="mensaje"></p>

  <div id="productosContainer"></div>

  <h2>Carrito</h2>
  <div id="carrito"></div>
  <button id="vaciar-carrito">Vaciar carrito</button>

  <button id="actualizar-catalogo">Forzar Actualización de Catálogo</button>

  <script src="app.js"></script>
</body>
</html>
